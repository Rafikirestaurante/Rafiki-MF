name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - "supabase/functions/**"
      - "supabase/config.toml"
      - ".github/workflows/deploy-supabase-functions.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supabase-edge-functions-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy functions to Rafiki MF
    runs-on: ubuntu-latest

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required GitHub secrets
        shell: bash
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "Missing GitHub secret: SUPABASE_ACCESS_TOKEN"
            exit 1
          fi
          if [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "Missing GitHub secret: SUPABASE_PROJECT_REF"
            exit 1
          fi

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy gmail-oauth-start
        run: supabase functions deploy gmail-oauth-start --project-ref "$SUPABASE_PROJECT_REF"

      - name: Deploy gmail-oauth-callback
        run: supabase functions deploy gmail-oauth-callback --project-ref "$SUPABASE_PROJECT_REF"

      - name: Deploy gmail-connection-status
        run: supabase functions deploy gmail-connection-status --project-ref "$SUPABASE_PROJECT_REF"

      - name: Deploy gmail-test-connection
        run: supabase functions deploy gmail-test-connection --project-ref "$SUPABASE_PROJECT_REF"

      - name: Deploy gmail-diagnostics
        run: supabase functions deploy gmail-diagnostics --project-ref "$SUPABASE_PROJECT_REF"

      - name: Deploy gmail-disconnect
        run: supabase functions deploy gmail-disconnect --project-ref "$SUPABASE_PROJECT_REF"

      - name: Deploy gmail-sync-now
        run: supabase functions deploy gmail-sync-now --project-ref "$SUPABASE_PROJECT_REF"

      - name: Deploy employee-access-admin
        run: supabase functions deploy employee-access-admin --project-ref "$SUPABASE_PROJECT_REF"

      - name: Deploy employee-public-access
        run: supabase functions deploy employee-public-access --project-ref "$SUPABASE_PROJECT_REF"
